[colors]
background = #313131
background-alt = #414141
foreground = #d1d1d1
primary = #fffffff3
secondary = #ffffff
alert = #A54242
disabled = #fefefe

[bar/lol]
width = 100%
height = 12pt
radius = 0
dpi = 100
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 0
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
override-redirect = true
wm-restack = generic

font-0 = DejaVu Sans Mono:size=8;2
font-1 = Noto Sans:size=8;2
font-2 = Noto Sans Symbols2:size=8;2
font-3 = Noto Sans CJK JP:size=8;2
font-4 = Noto Sans Ethiopic:size=8;2
font-5 = Symbola:size=8;2
font-6 = Noto Sans Runic:size=6;2
font-7 = Noto Sans Vai:size=8;2
font-8 = Noto Serif Malayalam:size=8:weight=bold;2

modules-left = xworkspaces xwindow
modules-right = menu-all memory cpu date
modules-center =

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
fixed-center = true ;


[module/menu-all]
type = custom/menu
label-open = ൜
label-close = x
label-separator = --
label-padding-left = 1
label-padding-right = 1
menu-0-0 = ⸎
menu-0-0-exec = #menu-all.open.1
menu-0-1 = ⸿
menu-0-1-exec = rofi -show drun
menu-1-0 = off
menu-1-0-exec = loginctl poweroff
menu-1-1 = reboot
menu-1-1-exec = loginctl reboot
menu-1-2 = logout
menu-1-2-exec = loginctl terminate-session $XDG_SESSION_ID
menu-1-3 = lock
menu-1-3-exec = slock
format-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
enable-scroll = true
reverse-scroll = true
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-background = ${colors.background}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
format = <label>
label = %instance%
format-background = ${colors.background}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "䇨 "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%
format-background = ${colors.background}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ə"
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%
format-background = ${colors.background}

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}
format-background = ${colors.background}

[settings]
screenchange-reload = true
pseudo-transparency = true ;
